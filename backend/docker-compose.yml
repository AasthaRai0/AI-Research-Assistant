services:
  db:
    image: postgres:16-alpine
    container_name: research_assistant_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: research_assistant_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Overrides .env's DATABASE_URL host to point at the `db` service name,
      # which only resolves inside the Docker network.
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/research_assistant
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data:
